<div class="vote-buttons">
  <button
    type="button"
    class="vote-button upvote"
    [class.active]="isUpvoted"
    (click)="onUpvote()"
    [attr.aria-label]="isAuthenticated ? 'Upvote' : 'Login to vote'"
  >
    <i class="ci ci-Arrow_Circle_Up"></i>
  </button>
  <span class="vote-score" [class.upvoted]="isUpvoted" [class.downvoted]="isDownvoted">
    {{ voteScore() }}
  </span>
  <button
    class="vote-button downvote"
    [class.active]="isDownvoted"
    (click)="onDownvote()"
    [title]="isAuthenticated ? 'Downvote' : 'Login to vote'"
    [attr.aria-label]="isAuthenticated ? 'Downvote' : 'Login to vote'"
  >
    <i class="ci ci-Arrow_Circle_Down"></i>
  </button>
</div>

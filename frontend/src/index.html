<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Recipe Exchange</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Discover, share, and vote on recipes from a community of home cooks. Browse by category, save your favorites, and share your own creations."
    />
    <meta name="theme-color" content="#0153B7" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Recipe Exchange" />
    <meta
      property="og:description"
      content="Discover, share, and vote on recipes from a community of home cooks."
    />
    <meta property="og:url" content="https://recipe-exchange.com/" />
    <meta property="og:image" content="https://recipe-exchange.com/logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Recipe Exchange" />
    <meta
      name="twitter:description"
      content="Discover, share, and vote on recipes from a community of home cooks."
    />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Critical CSS inlined to avoid render-blocking -->
    <style>
      :root {
        --color-primary: #0153b7;
        --color-gray-50: #f8fafc;
        --color-gray-900: #0f172b;
        --color-text-primary: var(--color-gray-900);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      body { background: var(--color-gray-50); color: var(--color-text-primary); }
      * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
